name: Build and Push Docker Image

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate version tag
        id: version
        run: |
          DATE=$(date -u +%Y-%m-%d)
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${DATE}-${SHORT_SHA}"
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/docker-image-checker-king"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tags=${IMAGE}:${VERSION},${IMAGE}:latest" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ./source
          push: true
          tags: ${{ steps.version.outputs.tags }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_VERSION=${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: |
            Docker image: `${{ secrets.DOCKERHUB_USERNAME }}/docker-image-checker-king:${{ steps.version.outputs.version }}`

            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/docker-image-checker-king:${{ steps.version.outputs.version }}
            ```
          generate_release_notes: true
